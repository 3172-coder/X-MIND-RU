<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Remaster | People X</title>

<style>
:root {
    --bg-image: url("bg.jpg");

/* =======================
   PNG ЦЕНТРАЛЬНАЯ КНОПКА
======================= */
.center-png {
    display: flex;
    justify-content: center;
    margin: 150px 0 40px 0; /* отступ сверху/снизу */
    width: 100%;
}

.center-png a {
    display: inline-block;
}

.center-png img {
    width: min(500px, 30vw); 
    height: auto;
    transition: 0.3s;
    filter: drop-shadow(0 0 10px rgba(0,255,255,0.4));
}

.center-png img:hover {
    transform: scale(1.08);
}
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #d6f0ff;
    background-image: var(--bg-image);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: -1;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 20px;
    letter-spacing: 1px;
}

/* EN кнопка (БЕЗ нового окна) */
.lang-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    padding: 8px 14px;
    background: #00bcd4;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 6px;
    transition: 0.3s;
}
.lang-btn:hover {
    background: #00ffd5;
}

.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
    padding: 30px;
    flex-wrap: wrap;
}

.video {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(0,255,255,0.3);
    box-shadow: 0 0 20px rgba(0,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.video:hover {
    transform: scale(1.03);
    box-shadow: 0 0 30px rgba(0,255,255,0.25);
}

.big { width: 560px; }
.medium { width: 360px; }
.small { width: 240px; }

.video img {
    width: 100%;
    display: block;
    aspect-ratio: 16 / 9;
    object-fit: cover;
}

.donate {
    display: block;
    margin: 15px auto 0;
    width: fit-content;
    padding: 10px 16px;
    background: #00ffd5;
    color: black;
    font-weight: bold;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}
.donate:hover {
    background: #00bcd4;
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- EN (без нового окна) -->
<a class="lang-btn" href="https://3172-coder.github.io/X-MIND-EN/">EN</a>

<header>
    AI slop Философия Биологического Интеллекта для людей X | by max_remaster
</header>

<div class="container">

    <!-- БОЛЬШОЙ -->
    <div class="video big">
        <a href="https://www.youtube.com/watch?v=vJpavQTuZIk" target="_blank" rel="noopener noreferrer">
            <img src="video1.jpg" alt="">
        </a>

        <a class="donate" href="https://www.donationalerts.com/r/max_remaster" target="_blank" rel="noopener noreferrer">
            Сбор на текущую публикацию
        </a>
    </div>

    <!-- СРЕДНИЙ -->
    <div class="video medium">
        <a href="page2.html" target="_blank" rel="noopener noreferrer">
            <img src="video2.jpg" alt="">
        </a>
    </div>

    <!-- МАЛЕНЬКИЙ -->
    <div class="video small">
        <a href="page3.html" target="_blank" rel="noopener noreferrer">
            <img src="video3.jpg" alt="">
        </a>
    </div>

<!-- PNG кнопка (внизу страницы, не перекрывает контент) -->
<div class="center-png">
    <a href="https://www.youtube.com/@XMind101"
       target="_blank"
       rel="noopener noreferrer">

        <img src="button.png" alt="action button">
    </a>
</div>

</div>

</body>
</html>
